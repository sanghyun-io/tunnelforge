name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact merged main commit to tag
        required: true
        type: string
      confirm:
        description: Type CREATE_RELEASE_TAG to confirm
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production-release

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Checkout approved target
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Validate target and create tag
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail

          if [ "$CONFIRM" != "CREATE_RELEASE_TAG" ]; then
            echo "Confirmation must be CREATE_RELEASE_TAG." >&2
            exit 1
          fi
          if ! echo "$TARGET_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "target_sha must be a full 40-character commit SHA." >&2
            exit 1
          fi

          git fetch --no-tags origin main
          MAIN_SHA=$(git rev-parse origin/main)
          CHECKED_OUT_SHA=$(git rev-parse HEAD)
          if [ "$TARGET_SHA" != "$MAIN_SHA" ] || [ "$TARGET_SHA" != "$CHECKED_OUT_SHA" ]; then
            echo "Approved target must equal the current main HEAD." >&2
            echo "target=$TARGET_SHA main=$MAIN_SHA checkout=$CHECKED_OUT_SHA" >&2
            exit 1
          fi

          PYTHON_VERSION=$(grep '__version__' src/version.py | cut -d'"' -f2)
          PROJECT_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -1)
          INSTALLER_VERSION=$(sed -n 's/^#define MyAppVersion "\([^"]*\)"/\1/p' installer/TunnelForge.iss | head -1)
          if [ -z "$PYTHON_VERSION" ] || [ "$PYTHON_VERSION" != "$PROJECT_VERSION" ] || \
             [ "$PYTHON_VERSION" != "$INSTALLER_VERSION" ]; then
            echo "Version files are missing or inconsistent." >&2
            echo "python=$PYTHON_VERSION project=$PROJECT_VERSION installer=$INSTALLER_VERSION" >&2
            exit 1
          fi

          TAG="v${PYTHON_VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; refusing to retarget it." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$TARGET_SHA" -m "Release $TAG"
          git push origin "refs/tags/$TAG"
          echo "Created $TAG at $TARGET_SHA. The release workflow will build a draft release."
