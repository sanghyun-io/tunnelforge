name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact merged main commit to tag
        required: true
        type: string
      version:
        description: Release version without the v prefix
        required: true
        type: string
      confirm:
        description: Type CREATE_RELEASE_TAG to confirm
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production-release
    permissions:
      contents: write

    steps:
      - name: Checkout approved target
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate target and create tag
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
          VERSION: ${{ inputs.version }}
          CONFIRM: ${{ inputs.confirm }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "$CONFIRM" != "CREATE_RELEASE_TAG" ]; then
            echo "Confirmation must be CREATE_RELEASE_TAG." >&2
            exit 1
          fi
          if ! echo "$TARGET_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "target_sha must be a full 40-character commit SHA." >&2
            exit 1
          fi
          if ! echo "$VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "version must be a canonical SemVer value without the v prefix." >&2
            exit 1
          fi

          git fetch --no-tags origin main
          MAIN_SHA=$(git rev-parse origin/main)
          CHECKED_OUT_SHA=$(git rev-parse HEAD)
          if [ "$TARGET_SHA" != "$MAIN_SHA" ] || [ "$TARGET_SHA" != "$CHECKED_OUT_SHA" ]; then
            echo "Approved target must equal the current main HEAD." >&2
            echo "target=$TARGET_SHA main=$MAIN_SHA checkout=$CHECKED_OUT_SHA" >&2
            exit 1
          fi

          PYTHON_VERSION=$(grep '__version__' src/version.py | cut -d'"' -f2)
          PROJECT_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -1)
          INSTALLER_VERSION=$(sed -n 's/^#define MyAppVersion "\([^"]*\)"/\1/p' installer/TunnelForge.iss | head -1)
          if [ -z "$PYTHON_VERSION" ] || [ "$PYTHON_VERSION" != "$VERSION" ] || \
             [ "$PROJECT_VERSION" != "$VERSION" ] || [ "$INSTALLER_VERSION" != "$VERSION" ]; then
            echo "Version input does not match all release version files." >&2
            echo "input=$VERSION python=$PYTHON_VERSION project=$PROJECT_VERSION installer=$INSTALLER_VERSION" >&2
            exit 1
          fi

          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; refusing to retarget it." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$TARGET_SHA" -m "Release $TAG"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "refs/tags/$TAG"
          echo "Created $TAG at $TARGET_SHA. Dispatch Build and Release separately to create the approved draft."
