name: Build and Release

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v1.0.1 등의 태그 push 시 자동 실행

permissions:
  contents: write  # Required for creating releases and uploading assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-2025

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 전체 히스토리 (릴리스 노트 생성용)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify version consistency
        shell: bash
        run: |
          PYTHON_VERSION=$(python -c "from src.version import __version__; print(__version__)")
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          echo "Python version: $PYTHON_VERSION"
          echo "Tag version: $TAG_VERSION"
          if [ "$PYTHON_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Error: Version mismatch!"
            echo "   src/version.py has: $PYTHON_VERSION"
            echo "   Git tag has: $TAG_VERSION"
            echo "   Please update src/version.py to match the tag version."
            exit 1
          fi
          echo "✅ Version consistency verified: $PYTHON_VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            migration_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('migration_core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build tunnelforge-core (Rust)
        shell: pwsh
        run: |
          cargo build --manifest-path migration_core\Cargo.toml --release
          if (-not (Test-Path "migration_core\target\release\tunnelforge-core.exe")) {
            Write-Host "::error::tunnelforge-core.exe not produced by cargo build"
            exit 1
          }
          $coreSize = (Get-Item "migration_core\target\release\tunnelforge-core.exe").Length / 1MB
          Write-Host "tunnelforge-core.exe built: $($coreSize.ToString('0.0')) MB"

      - name: Setup GitHub App credentials
        if: ${{ vars.GH_APP_ID != '' }}
        shell: bash
        env:
          APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          # .env 파일 생성 (GitHub App 자동 이슈 리포팅용)
          echo "GITHUB_APP_ID=${{ vars.GH_APP_ID }}" >> .env
          echo "GITHUB_APP_INSTALLATION_ID=${{ vars.GH_APP_INSTALLATION_ID }}" >> .env
          echo "GITHUB_REPO=${{ vars.GH_ISSUE_REPO || github.repository }}" >> .env

          # Private Key 파일 생성
          mkdir -p secrets
          echo "$APP_PRIVATE_KEY" > secrets/github-app.pem
          echo "GITHUB_APP_PRIVATE_KEY=secrets/github-app.pem" >> .env

          echo "✅ GitHub App credentials configured"

      - name: Embed GitHub App credentials
        if: ${{ vars.GH_APP_ID != '' }}
        env:
          GITHUB_APP_ID: ${{ vars.GH_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ vars.GH_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: secrets/github-app.pem
          GITHUB_REPO: ${{ vars.GH_ISSUE_REPO || github.repository }}
        run: |
          python scripts/embed_github_credentials.py

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller tunnel-manager.spec

      - name: Verify EXE build
        run: |
          if (!(Test-Path "dist\TunnelForge.exe")) {
            Write-Host "❌ Error: EXE file not found!"
            exit 1
          }
          $exeSize = (Get-Item "dist\TunnelForge.exe").Length / 1MB
          Write-Host "✅ EXE built: $($exeSize.ToString('0.0')) MB"

      - name: Build Bootstrapper (for recovery feature)
        run: |
          Write-Host "Building bootstrapper for recovery/update feature..."
          python -m PyInstaller bootstrapper/bootstrapper.spec --noconfirm

          if (!(Test-Path "dist\TunnelForge-WebSetup.exe")) {
            Write-Host "❌ Error: Bootstrapper build failed!"
            exit 1
          }

          $bootstrapperSize = (Get-Item "dist\TunnelForge-WebSetup.exe").Length / 1MB
          Write-Host "✅ Bootstrapper built: TunnelForge-WebSetup.exe ($($bootstrapperSize.ToString('0.0')) MB)"
          Write-Host "   This will be included in the installer for recovery feature."

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
          # Verify installation and show path
          $isccPath = Get-Command iscc -ErrorAction SilentlyContinue
          if ($isccPath) {
            Write-Host "ISCC found in PATH: $($isccPath.Source)"
          } else {
            Write-Host "Searching for ISCC.exe..."
            Get-ChildItem -Path "C:\ProgramData\chocolatey" -Recurse -Filter "ISCC.exe" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          }

      - name: Build Windows Installer
        run: |
          # Add Chocolatey Inno Setup to PATH if exists
          $chocoIscc = "C:\ProgramData\chocolatey\lib\innosetup\tools"
          if (Test-Path $chocoIscc) {
            $env:PATH = "$chocoIscc;$env:PATH"
          }
          .\scripts\build-installer.ps1 -SkipPyInstaller

      - name: Verify Installer build
        id: verify_installer
        run: |
          $installerFile = Get-Item "output\TunnelForge-Setup-*.exe" | Select-Object -First 1
          if (!$installerFile) {
            Write-Host "❌ Error: Installer file not found!"
            exit 1
          }
          $installerSize = $installerFile.Length / 1MB
          Write-Host "✅ Installer built: $($installerFile.Name) ($($installerSize.ToString('0.0')) MB)"
          echo "installer_path=$($installerFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "installer_name=$($installerFile.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TunnelForge-Windows-${{ steps.get_version.outputs.version }}
          path: |
            output/TunnelForge-Setup-${{ steps.get_version.outputs.version }}.exe
            dist/TunnelForge-WebSetup.exe
          if-no-files-found: error

  build-macos-app:
    name: Build macOS App (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Rust
        run: |
          rustc --version
          cargo --version

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify version consistency
        shell: bash
        run: |
          PYTHON_VERSION=$(python -c "from src.version import __version__; print(__version__)")
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          if [ "$PYTHON_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: src/version.py=$PYTHON_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Setup GitHub App credentials
        if: ${{ vars.GH_APP_ID != '' }}
        shell: bash
        env:
          APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          echo "GITHUB_APP_ID=${{ vars.GH_APP_ID }}" >> .env
          echo "GITHUB_APP_INSTALLATION_ID=${{ vars.GH_APP_INSTALLATION_ID }}" >> .env
          echo "GITHUB_REPO=${{ vars.GH_ISSUE_REPO || github.repository }}" >> .env
          mkdir -p secrets
          echo "$APP_PRIVATE_KEY" > secrets/github-app.pem
          echo "GITHUB_APP_PRIVATE_KEY=secrets/github-app.pem" >> .env

      - name: Embed GitHub App credentials
        if: ${{ vars.GH_APP_ID != '' }}
        env:
          GITHUB_APP_ID: ${{ vars.GH_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ vars.GH_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: secrets/github-app.pem
          GITHUB_REPO: ${{ vars.GH_ISSUE_REPO || github.repository }}
        run: |
          python scripts/embed_github_credentials.py

      - name: Run tests
        run: |
          pytest tests/test_platform_paths.py tests/test_platform_integration.py tests/test_rust_core_packaging.py tests/test_update_downloader.py tests/test_settings_update_actions.py tests/test_app_self_check.py
          cargo test --manifest-path migration_core/Cargo.toml

      - name: Smoke source-run TunnelForge app
        run: |
          cargo build --manifest-path migration_core/Cargo.toml --release
          RESPONSE="$(python main.py --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          assert data["self_check"]["icon_exists"] is True
          assert data["self_check"]["core_exists"] is True
          assert data["self_check"]["core_hello"]["service"] == "tunnelforge-core"
          assert data["self_check"]["core_hello"]["success"] is True
          PY

      - name: Build macOS app
        run: |
          bash scripts/build-macos.sh

      - name: Smoke packaged TunnelForge app
        shell: bash
        run: |
          APP_EXECUTABLE="dist/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["event"] == "result"
          assert data["core_hello"]["service"] == "tunnelforge-core"
          assert data["core_hello"]["request_id"] == "self-check"
          PY

      - name: Import Apple Developer ID certificate
        shell: bash
        env:
          APPLE_CODESIGN_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CODESIGN_CERTIFICATE_P12_BASE64 }}
          APPLE_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CODESIGN_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CODESIGN_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CODESIGN_CERTIFICATE_P12_BASE64:-}" ]]; then
            echo "Apple signing certificate secret is not set; unsigned macOS artifacts will be built."
            exit 0
          fi

          if [[ -z "${APPLE_CODESIGN_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "APPLE_CODESIGN_CERTIFICATE_PASSWORD is required when APPLE_CODESIGN_CERTIFICATE_P12_BASE64 is set." >&2
            exit 1
          fi

          mkdir -p build
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path("build/apple-codesign.p12").write_bytes(
              base64.b64decode(os.environ["APPLE_CODESIGN_CERTIFICATE_P12_BASE64"])
          )
          PY

          KEYCHAIN_PATH="$RUNNER_TEMP/tunnelforge-signing.keychain-db"
          KEYCHAIN_PASSWORD="${APPLE_CODESIGN_KEYCHAIN_PASSWORD:-$(uuidgen)}"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import build/apple-codesign.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CODESIGN_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          if [[ -z "${APPLE_CODESIGN_IDENTITY:-}" ]]; then
            APPLE_CODESIGN_IDENTITY="$(
              security find-identity -v -p codesigning "$KEYCHAIN_PATH" |
              awk -F '"' '/Developer ID Application/ { print $2; exit }'
            )"
          fi

          if [[ -z "${APPLE_CODESIGN_IDENTITY:-}" ]]; then
            echo "No Developer ID Application signing identity found in imported certificate." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          {
            echo "APPLE_CODESIGN_IDENTITY=$APPLE_CODESIGN_IDENTITY"
            echo "APPLE_CODESIGN_KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

      - name: Package macOS app
        env:
          MACOS_PACKAGE_ARCH: ${{ matrix.arch }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          bash scripts/package-macos.sh "${{ steps.get_version.outputs.version }}"
          test -f "dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.zip"
          test -f "dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg"
          test -f "dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.zip.sha256"
          test -f "dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg.sha256"

      - name: Smoke DMG package
        shell: bash
        run: |
          DMG_PATH="dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg"
          DMG_SMOKE_MOUNT="$PWD/build/dmg-smoke-mount"
          rm -rf "$DMG_SMOKE_MOUNT"
          mkdir -p "$DMG_SMOKE_MOUNT"
          hdiutil attach "$DMG_PATH" -mountpoint "$DMG_SMOKE_MOUNT" -quiet
          trap 'hdiutil detach "$DMG_SMOKE_MOUNT" -quiet || true' EXIT
          APP_EXECUTABLE="$DMG_SMOKE_MOUNT/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["service"] == "tunnelforge-core"
          PY

      - name: Smoke copied DMG install
        shell: bash
        run: |
          DMG_PATH="dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg"
          INSTALL_SMOKE_MOUNT="$PWD/build/install-smoke-mount"
          rm -rf "$INSTALL_SMOKE_MOUNT" build/install-smoke
          mkdir -p "$INSTALL_SMOKE_MOUNT" build/install-smoke
          hdiutil attach "$DMG_PATH" -mountpoint "$INSTALL_SMOKE_MOUNT" -quiet
          trap 'hdiutil detach "$INSTALL_SMOKE_MOUNT" -quiet || true' EXIT
          ditto "$INSTALL_SMOKE_MOUNT/TunnelForge.app" "build/install-smoke/TunnelForge.app"
          hdiutil detach "$INSTALL_SMOKE_MOUNT" -quiet
          trap - EXIT
          APP_EXECUTABLE="build/install-smoke/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["service"] == "tunnelforge-core"
          PY

      - name: Smoke LaunchAgent registration
        shell: bash
        run: |
          bash scripts/smoke-macos-launchagent.sh build/install-smoke/TunnelForge.app

      - name: Smoke /Applications install
        shell: bash
        env:
          MACOS_APPLICATIONS_SMOKE_ALLOW_SYSTEM: "1"
        run: |
          DMG_PATH="dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg"
          bash scripts/smoke-macos-applications-install.sh "$DMG_PATH"

      - name: Smoke ZIP package
        shell: bash
        run: |
          ZIP_PATH="dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.zip"
          rm -rf build/zip-smoke
          mkdir -p build/zip-smoke
          ditto -x -k "$ZIP_PATH" build/zip-smoke
          APP_EXECUTABLE="build/zip-smoke/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["service"] == "tunnelforge-core"
          PY

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}
          path: |
            dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg
            dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.zip
            dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg.sha256
            dist/TunnelForge-macOS-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.zip.sha256
          if-no-files-found: error

      - name: Cleanup Apple signing keychain
        if: always()
        shell: bash
        run: |
          rm -f build/apple-codesign.p12
          if [[ -n "${APPLE_CODESIGN_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$APPLE_CODESIGN_KEYCHAIN_PATH" || true
          fi

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-installer
      - build-macos-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Verify version consistency
        shell: bash
        run: |
          PYTHON_VERSION=$(python -c "from src.version import __version__; print(__version__)")
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          if [ "$PYTHON_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: src/version.py=$PYTHON_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Verify release artifacts
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          test -f "release-artifacts/TunnelForge-Setup-$VERSION.exe"
          test -f "release-artifacts/TunnelForge-WebSetup.exe"
          for ARCH in arm64 x86_64; do
            test -f "release-artifacts/TunnelForge-macOS-$VERSION-$ARCH.dmg"
            test -f "release-artifacts/TunnelForge-macOS-$VERSION-$ARCH.zip"
            test -f "release-artifacts/TunnelForge-macOS-$VERSION-$ARCH.dmg.sha256"
            test -f "release-artifacts/TunnelForge-macOS-$VERSION-$ARCH.zip.sha256"
          done

      - name: Generate Release Notes
        id: release_notes
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # 이전 태그 찾기
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Previous tag: $PREV_TAG"
          echo "Current tag: v$VERSION"

          # 변경사항 수집 (Conventional Commits 파싱)
          echo "" > changes_feat.txt
          echo "" > changes_fix.txt
          echo "" > changes_docs.txt
          echo "" > changes_refactor.txt
          echo "" > changes_perf.txt
          echo "" > changes_other.txt

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || echo "")
          else
            # 첫 릴리스인 경우 최근 50개 커밋
            COMMITS=$(git log --pretty=format:"%s" -50 2>/dev/null || echo "")
          fi

          # 커밋 메시지 파싱
          while IFS= read -r line; do
            [ -z "$line" ] && continue

            # Conventional Commits 파싱 (간단한 패턴 사용)
            if [[ "$line" == feat:* ]] || [[ "$line" == feat\(*\):* ]]; then
              msg="${line#*: }"
              echo "- $msg" >> changes_feat.txt
            elif [[ "$line" == fix:* ]] || [[ "$line" == fix\(*\):* ]]; then
              msg="${line#*: }"
              echo "- $msg" >> changes_fix.txt
            elif [[ "$line" == docs:* ]] || [[ "$line" == docs\(*\):* ]]; then
              msg="${line#*: }"
              echo "- $msg" >> changes_docs.txt
            elif [[ "$line" == refactor:* ]] || [[ "$line" == refactor\(*\):* ]]; then
              msg="${line#*: }"
              echo "- $msg" >> changes_refactor.txt
            elif [[ "$line" == perf:* ]] || [[ "$line" == perf\(*\):* ]]; then
              msg="${line#*: }"
              echo "- $msg" >> changes_perf.txt
            elif [[ "$line" != chore:* ]] && [[ "$line" != chore\(*\):* ]] && \
                 [[ "$line" != ci:* ]] && [[ "$line" != ci\(*\):* ]] && \
                 [[ "$line" != test:* ]] && [[ "$line" != test\(*\):* ]] && \
                 [[ "$line" != style:* ]] && [[ "$line" != style\(*\):* ]] && \
                 [[ "$line" != build:* ]] && [[ "$line" != build\(*\):* ]]; then
              # chore, ci, test, style, build 제외한 기타 커밋
              if [[ "$line" != Merge* ]] && [[ "$line" != *"Bump version"* ]]; then
                echo "- $line" >> changes_other.txt
              fi
            fi
          done <<< "$COMMITS"

          # 릴리스 노트 생성
          echo "## TunnelForge v$VERSION" > release_notes.md
          echo "" >> release_notes.md

          # 변경사항 섹션 추가
          HAS_CHANGES=false

          if [ -s changes_feat.txt ] && [ "$(cat changes_feat.txt | tr -d '[:space:]')" != "" ]; then
            echo "### ✨ 새로운 기능" >> release_notes.md
            cat changes_feat.txt >> release_notes.md
            echo "" >> release_notes.md
            HAS_CHANGES=true
          fi

          if [ -s changes_fix.txt ] && [ "$(cat changes_fix.txt | tr -d '[:space:]')" != "" ]; then
            echo "### 🐛 버그 수정" >> release_notes.md
            cat changes_fix.txt >> release_notes.md
            echo "" >> release_notes.md
            HAS_CHANGES=true
          fi

          if [ -s changes_perf.txt ] && [ "$(cat changes_perf.txt | tr -d '[:space:]')" != "" ]; then
            echo "### ⚡ 성능 개선" >> release_notes.md
            cat changes_perf.txt >> release_notes.md
            echo "" >> release_notes.md
            HAS_CHANGES=true
          fi

          if [ -s changes_refactor.txt ] && [ "$(cat changes_refactor.txt | tr -d '[:space:]')" != "" ]; then
            echo "### ♻️ 리팩토링" >> release_notes.md
            cat changes_refactor.txt >> release_notes.md
            echo "" >> release_notes.md
            HAS_CHANGES=true
          fi

          if [ -s changes_docs.txt ] && [ "$(cat changes_docs.txt | tr -d '[:space:]')" != "" ]; then
            echo "### 📝 문서" >> release_notes.md
            cat changes_docs.txt >> release_notes.md
            echo "" >> release_notes.md
            HAS_CHANGES=true
          fi

          if [ -s changes_other.txt ] && [ "$(cat changes_other.txt | tr -d '[:space:]')" != "" ]; then
            echo "### 📦 기타 변경사항" >> release_notes.md
            cat changes_other.txt >> release_notes.md
            echo "" >> release_notes.md
            HAS_CHANGES=true
          fi

          if [ "$HAS_CHANGES" = false ]; then
            echo "### 📦 변경사항" >> release_notes.md
            echo "- 버그 수정 및 안정성 개선" >> release_notes.md
            echo "" >> release_notes.md
          fi

          # 다운로드 및 설치 안내
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📥 다운로드" >> release_notes.md
          echo "| 파일 | 설명 | 크기 |" >> release_notes.md
          echo "|------|------|------|" >> release_notes.md
          echo "| \`TunnelForge-WebSetup.exe\` | 온라인 설치 (권장) | ~5MB |" >> release_notes.md
          echo "| \`TunnelForge-Setup-$VERSION.exe\` | 오프라인 설치 | ~35MB |" >> release_notes.md
          echo "| \`TunnelForge-macOS-$VERSION-arm64.dmg\` | macOS 앱 이미지 (Apple Silicon) | 환경별 산출 |" >> release_notes.md
          echo "| \`TunnelForge-macOS-$VERSION-arm64.zip\` | macOS 앱 압축본 (Apple Silicon) | 환경별 산출 |" >> release_notes.md
          echo "| \`TunnelForge-macOS-$VERSION-arm64.{dmg,zip}.sha256\` | macOS SHA-256 체크섬 (Apple Silicon) | 환경별 산출 |" >> release_notes.md
          echo "| \`TunnelForge-macOS-$VERSION-x86_64.dmg\` | macOS 앱 이미지 (Intel) | 환경별 산출 |" >> release_notes.md
          echo "| \`TunnelForge-macOS-$VERSION-x86_64.zip\` | macOS 앱 압축본 (Intel) | 환경별 산출 |" >> release_notes.md
          echo "| \`TunnelForge-macOS-$VERSION-x86_64.{dmg,zip}.sha256\` | macOS SHA-256 체크섬 (Intel) | 환경별 산출 |" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 설치 방법" >> release_notes.md
          echo "" >> release_notes.md
          echo "**온라인 설치 (권장):**" >> release_notes.md
          echo "1. \`TunnelForge-WebSetup.exe\` 다운로드" >> release_notes.md
          echo "2. 실행하면 자동으로 최신 버전 다운로드 및 설치" >> release_notes.md
          echo "" >> release_notes.md
          echo "**오프라인 설치:**" >> release_notes.md
          echo "1. \`TunnelForge-Setup-$VERSION.exe\` 다운로드" >> release_notes.md
          echo "2. 설치 마법사를 따라 진행" >> release_notes.md
          echo "" >> release_notes.md
          echo "**macOS:**" >> release_notes.md
          echo "1. Mac 종류에 맞는 \`TunnelForge-macOS-$VERSION-{arm64|x86_64}.dmg\` 다운로드" >> release_notes.md
          echo "2. DMG를 열고 \`TunnelForge.app\`을 Applications로 이동" >> release_notes.md
          echo "3. 선택적으로 \`.sha256\` 파일로 다운로드를 검증: \`shasum -a 256 -c <파일명>.sha256\`" >> release_notes.md

          echo ""
          echo "========== Generated Release Notes =========="
          cat release_notes.md
          echo "============================================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          files: |
            release-artifacts/TunnelForge-Setup-*.exe
            release-artifacts/TunnelForge-WebSetup.exe
            release-artifacts/TunnelForge-macOS-*.dmg
            release-artifacts/TunnelForge-macOS-*.zip
            release-artifacts/TunnelForge-macOS-*.dmg.sha256
            release-artifacts/TunnelForge-macOS-*.zip.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "========================================"
          echo "✅ Release Created Successfully!"
          echo "========================================"
          echo ""
          echo "Release: v${{ steps.get_version.outputs.version }}"
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.version }}"
          echo ""
