name: Version Gate

# PR 라벨 기반 버전 bump — 필수 상태 체크
#
# version:* 라벨이 있으면 PR 브랜치에 bump 커밋 자동 추가.
# 브랜치 보호 규칙으로 이 체크가 통과해야만 머지 가능.

on:
  pull_request:
    types: [labeled, unlabeled, opened, synchronize, reopened]

concurrency:
  group: version-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  macos-support-tracking-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      checks: read

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Check macOS support GitHub tracking gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/check-macos-support-gate.py \
            --repo "${{ github.repository }}" \
            --skip-pr-checks

  rust-core-regression-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run Rust Core regression gate
        shell: pwsh
        run: ./scripts/rust-core-regression-gate.ps1

      - name: Run Rust Core tests
        run: cargo test --manifest-path migration_core/Cargo.toml

  python-regression:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"

    steps:
      - name: Checkout PR
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Rust
        shell: pwsh
        run: |
          rustc --version
          cargo --version

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build tunnelforge-core (Rust)
        shell: pwsh
        run: cargo build --manifest-path migration_core/Cargo.toml --release

      - name: Run native DB Core integration
        shell: pwsh
        run: pytest tests/test_db_core_process_integration.py -q

      - name: Run full Python regression suite
        shell: pwsh
        run: pytest -q

      - name: Build and self-check frozen WebSetup
        shell: pwsh
        run: |
          pyinstaller bootstrapper/bootstrapper.spec
          $executable = "dist\TunnelForge-WebSetup.exe"
          if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
            throw "missing frozen WebSetup artifact: $executable"
          }
          $output = (& .\dist\TunnelForge-WebSetup.exe --self-check | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "frozen WebSetup self-check exited with $LASTEXITCODE"
          }
          if ($output -ne "TUNNELFORGE_WEBSETUP_SELF_CHECK_OK") {
            throw "unexpected frozen WebSetup self-check output: '$output'"
          }

  macos-app-validation:
    name: macOS App Validation (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout PR
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Rust
        run: |
          rustc --version
          cargo --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve version
        id: version
        run: |
          VERSION="$(python -c 'from src.version import __version__; print(__version__)')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run focused macOS tests
        run: |
          pytest \
            tests/test_platform_paths.py \
            tests/test_platform_integration.py \
            tests/test_resources.py \
            tests/test_update_downloader.py \
            tests/test_rust_core_packaging.py \
            tests/test_settings_update_actions.py \
            tests/test_app_self_check.py \
            tests/test_macos_support_docs.py
          cargo test --manifest-path migration_core/Cargo.toml

      - name: Smoke source-run TunnelForge app
        run: |
          cargo build --manifest-path migration_core/Cargo.toml --release
          RESPONSE="$(python main.py --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          assert data["self_check"]["icon_exists"] is True
          assert data["self_check"]["core_exists"] is True
          assert data["self_check"]["core_hello"]["service"] == "tunnelforge-core"
          assert data["self_check"]["core_hello"]["success"] is True
          PY

      - name: Run native DB Core integration
        run: pytest tests/test_db_core_process_integration.py -q

      - name: Build macOS app
        run: bash scripts/build-macos.sh

      - name: Smoke packaged TunnelForge app
        run: |
          APP_EXECUTABLE="dist/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["event"] == "result"
          assert data["core_hello"]["request_id"] == "self-check"
          assert data["core_hello"]["service"] == "tunnelforge-core"
          assert data["core_hello"]["success"] is True
          PY

      - name: Package macOS app
        env:
          MACOS_PACKAGE_ARCH: ${{ matrix.arch }}
        run: |
          bash scripts/package-macos.sh "${{ steps.version.outputs.version }}"
          test -f "dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg"
          test -f "dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.zip"
          test -f "dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg.sha256"
          test -f "dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.zip.sha256"

      - name: Smoke DMG package
        run: |
          DMG_PATH="dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg"
          DMG_SMOKE_MOUNT="$PWD/build/dmg-smoke-mount"
          rm -rf "$DMG_SMOKE_MOUNT"
          mkdir -p "$DMG_SMOKE_MOUNT"
          hdiutil attach "$DMG_PATH" -mountpoint "$DMG_SMOKE_MOUNT" -quiet
          trap 'hdiutil detach "$DMG_SMOKE_MOUNT" -quiet || true' EXIT
          APP_EXECUTABLE="$DMG_SMOKE_MOUNT/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["service"] == "tunnelforge-core"
          assert data["core_hello"]["success"] is True
          PY

      - name: Smoke copied DMG install
        run: |
          DMG_PATH="dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg"
          INSTALL_SMOKE_MOUNT="$PWD/build/install-smoke-mount"
          rm -rf "$INSTALL_SMOKE_MOUNT" build/install-smoke
          mkdir -p "$INSTALL_SMOKE_MOUNT" build/install-smoke
          hdiutil attach "$DMG_PATH" -mountpoint "$INSTALL_SMOKE_MOUNT" -quiet
          trap 'hdiutil detach "$INSTALL_SMOKE_MOUNT" -quiet || true' EXIT
          ditto "$INSTALL_SMOKE_MOUNT/TunnelForge.app" "build/install-smoke/TunnelForge.app"
          hdiutil detach "$INSTALL_SMOKE_MOUNT" -quiet
          trap - EXIT
          APP_EXECUTABLE="build/install-smoke/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["service"] == "tunnelforge-core"
          assert data["core_hello"]["success"] is True
          PY

      - name: Smoke LaunchAgent registration
        run: bash scripts/smoke-macos-launchagent.sh build/install-smoke/TunnelForge.app

      - name: Smoke /Applications install
        env:
          MACOS_APPLICATIONS_SMOKE_ALLOW_SYSTEM: "1"
        run: |
          DMG_PATH="dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg"
          bash scripts/smoke-macos-applications-install.sh "$DMG_PATH"

      - name: Smoke ZIP package
        run: |
          ZIP_PATH="dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.zip"
          rm -rf build/zip-smoke
          mkdir -p build/zip-smoke
          ditto -x -k "$ZIP_PATH" build/zip-smoke
          APP_EXECUTABLE="build/zip-smoke/TunnelForge.app/Contents/MacOS/TunnelForge"
          test -x "$APP_EXECUTABLE"
          RESPONSE="$("$APP_EXECUTABLE" --ui-smoke-check)"
          echo "$RESPONSE"
          RESPONSE="$RESPONSE" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RESPONSE"])
          assert data["success"] is True
          assert data["window_title"] == "TunnelForge"
          data = data["self_check"]
          assert data["icon_exists"] is True
          assert data["core_exists"] is True
          assert data["core_hello"]["service"] == "tunnelforge-core"
          assert data["core_hello"]["success"] is True
          PY

      - name: Upload macOS validation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: |
            dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg
            dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.zip
            dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.dmg.sha256
            dist/TunnelForge-macOS-${{ steps.version.outputs.version }}-${{ matrix.arch }}.zip.sha256
          if-no-files-found: error

  python39-db-core-native:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"

    steps:
      - name: Checkout PR
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Set up Rust
        run: |
          rustc --version
          cargo --version

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Build tunnelforge-core (Rust)
        run: cargo build --manifest-path migration_core/Cargo.toml --release

      - name: Compile Python DB Core modules
        run: |
          python -m compileall -q main.py src/core/db_core_client.py src/core/db_core_facade.py src/core/db_core_dbapi_shim.py src/core/db_core_service.py tests/test_db_core_process_contract.py

      - name: Import Python DB Core modules
        run: python -c "import main; import src.core.db_core_client; import src.core.db_core_service"

      - name: Run focused DB Core owner tests
        run: python -m pytest tests/test_db_core_process_contract.py -k "owner or deadline or callback or queued or frame" -q

      - name: Run native DB Core integration
        run: python -m pytest tests/test_db_core_process_integration.py -q

  version-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    outputs:
      bump_type: ${{ steps.check.outputs.bump_type }}

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Check version labels
        id: check
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # === Step 1: 라벨 검증 (최우선) ===
          VERSION_LABELS=$(echo "$PR_LABELS" | python3 -c "
          import json, sys
          labels = json.load(sys.stdin)
          version_labels = [l for l in labels if l.startswith('version:')]
          for l in version_labels:
              print(l)
          ")

          COUNT=$(echo "$VERSION_LABELS" | grep -c 'version:' || true)
          echo "감지된 version 라벨 수: $COUNT"

          if [ "$COUNT" -gt 1 ]; then
            echo "ERROR: 복수의 version 라벨 감지: $VERSION_LABELS"
            gh pr comment "$PR_NUMBER" --body \
              "⚠️ **Auto-version 실패**: 복수의 version 라벨이 감지되었습니다.

          감지된 라벨: \`$(echo $VERSION_LABELS | tr '\n' ' ')\`

          정확히 **1개**의 version 라벨만 허용됩니다:
          - \`version:patch\` — 버그 수정 (X.Y.Z+1)
          - \`version:minor\` — 새 기능 (X.Y+1.0)
          - \`version:major\` — Breaking changes (X+1.0.0)"
            exit 1
          fi

          if [ "$COUNT" -eq 0 ]; then
            echo "version 라벨 없음. 버전 bump 불필요 — 통과."
            echo "bump_type=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP_TYPE=$(echo "$VERSION_LABELS" | head -1 | sed 's/version://')
          echo "감지된 bump_type: $BUMP_TYPE"

          # Commit messages are not evidence of a completed bump. The trusted
          # version-bump job verifies all three version files against the
          # expected version calculated from the trusted base.
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

  version-bump:
    runs-on: ubuntu-24.04
    needs: version-validation
    if: needs.version-validation.result == 'success' && needs.version-validation.outputs.bump_type != ''
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.x'

      - name: Prepare trusted version bump from PR data
        id: bump
        env:
          BUMP_TYPE: ${{ needs.version-validation.outputs.bump_type }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin "$HEAD_SHA"
          mkdir -p .version-bump-input/src .version-bump-input/installer
          cp src/version.py .version-bump-input/src/version.py
          cp pyproject.toml .version-bump-input/pyproject.toml
          cp installer/TunnelForge.iss .version-bump-input/installer/TunnelForge.iss
          python scripts/bump_version.py \
            --bump-type "$BUMP_TYPE" \
            --version-file .version-bump-input/src/version.py \
            --pyproject-file .version-bump-input/pyproject.toml \
            --installer-file .version-bump-input/installer/TunnelForge.iss \
            > /tmp/bump.txt
          EXPECTED=$(grep 'new_version=' /tmp/bump.txt | cut -d= -f2)
          CURRENT_PY=$(git show "$HEAD_SHA:src/version.py" | grep '__version__' | cut -d'"' -f2)
          CURRENT_PROJECT=$(git show "$HEAD_SHA:pyproject.toml" | sed -n 's/^version = "\([^"]*\)"/\1/p' | head -1)
          CURRENT_INSTALLER=$(git show "$HEAD_SHA:installer/TunnelForge.iss" | sed -n 's/^#define MyAppVersion "\([^"]*\)"/\1/p' | head -1)
          echo "expected=$EXPECTED python=$CURRENT_PY project=$CURRENT_PROJECT installer=$CURRENT_INSTALLER"

          if [ -z "$EXPECTED" ] || [ -z "$CURRENT_PY" ] || \
             [ -z "$CURRENT_PROJECT" ] || [ -z "$CURRENT_INSTALLER" ]; then
            echo "ERROR: version parse failed"
            exit 1
          fi

          if [ "$CURRENT_PY" = "$EXPECTED" ] && \
             [ "$CURRENT_PROJECT" = "$EXPECTED" ] && \
             [ "$CURRENT_INSTALLER" = "$EXPECTED" ]; then
            echo "All PR version files match the trusted expected version. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "new_version=$EXPECTED" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App Token
        if: steps.bump.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Commit trusted bump tree and push
        if: steps.bump.outputs.skip != 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          export GIT_INDEX_FILE="$RUNNER_TEMP/version-bump-index"
          git read-tree "$HEAD_SHA"
          for path in src/version.py pyproject.toml installer/TunnelForge.iss; do
            mode=$(git ls-tree "$HEAD_SHA" -- "$path" | awk '{print $1}')
            blob=$(git hash-object -w ".version-bump-input/$path")
            git update-index --add --cacheinfo "$mode,$blob,$path"
          done
          tree=$(git write-tree)
          commit=$(printf '%s\n' \
            "chore: bump version to v${NEW_VERSION} [${{ needs.version-validation.outputs.bump_type }}]" \
            | git commit-tree "$tree" -p "$HEAD_SHA")
          git push \
            "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git" \
            "$commit:refs/heads/$HEAD_REF"
          echo "version bump completed: v${NEW_VERSION}"

  version-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs:
      - macos-support-tracking-gate
      - rust-core-regression-gate
      - python-regression
      - python39-db-core-native
      - macos-app-validation
      - version-validation
      - version-bump
    if: always()
    permissions: {}

    steps:
      - name: Require successful terminal gate state
        env:
          MACOS_TRACKING_RESULT: ${{ needs.macos-support-tracking-gate.result }}
          RUST_RESULT: ${{ needs.rust-core-regression-gate.result }}
          PYTHON_RESULT: ${{ needs.python-regression.result }}
          PYTHON39_NATIVE_RESULT: ${{ needs.python39-db-core-native.result }}
          MACOS_APP_RESULT: ${{ needs.macos-app-validation.result }}
          VERSION_VALIDATION_RESULT: ${{ needs.version-validation.result }}
          VERSION_BUMP_RESULT: ${{ needs.version-bump.result }}
          BUMP_TYPE: ${{ needs.version-validation.outputs.bump_type }}
        run: |
          set -euo pipefail

          for result in \
            "$MACOS_TRACKING_RESULT" \
            "$RUST_RESULT" \
            "$PYTHON_RESULT" \
            "$PYTHON39_NATIVE_RESULT" \
            "$MACOS_APP_RESULT" \
            "$VERSION_VALIDATION_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "ERROR: required job result is '$result'"
              exit 1
            fi
          done

          if [ -z "$BUMP_TYPE" ]; then
            if [ "$VERSION_BUMP_RESULT" != "skipped" ]; then
              echo "ERROR: version-bump must be skipped when no bump is required"
              exit 1
            fi
          else
            if [ "$VERSION_BUMP_RESULT" != "success" ]; then
              echo "ERROR: version-bump result is '$VERSION_BUMP_RESULT'"
              exit 1
            fi
          fi
